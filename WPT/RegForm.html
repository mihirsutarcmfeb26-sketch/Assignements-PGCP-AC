<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#fbeff5;
    font-family:Arial, sans-serif;
}

h1{
    text-align:center;
    color:#d63384;
    text-decoration:underline;
    margin-bottom:25px;
}

.form-box{
    width:900px;
    margin:auto;
    background:#d8f3ff;
    padding:25px;
    color:#333;
    border:2px solid #b6e8f7;
    border-radius:10px;
}

table{
    width:100%;
    border-spacing:12px;
}

td{
    vertical-align:top;
    font-size:14px;
}

label{
    font-weight:bold;
}

input[type="text"],
input[type="email"],
textarea,
select{
    padding:5px;
    width:220px;
    border:1px solid #aaa;
}

textarea{
    width:320px;
    height:90px;
}

.small{
    width:80px;
}

.medium{
    width:120px;
}

.note{
    font-size:13px;
}

.qual-table{
    width:100%;
    border-spacing:8px;
}

.qual-table input{
    width:150px;
}

button{
    padding:6px 14px;
    margin:8px;
    cursor:pointer;
    background:#ff69b4;
    color:white;
    border:none;
    border-radius:5px;
}

button:hover{
    background:#e754a3;
}

.center{
    text-align:center;
}

input[type="radio"],
input[type="checkbox"]{
    margin-right:5px;
}
</style>

</head>
<body>

<h1>STUDENT REGISTRATION FORM</h1>

<div class="form-box">

<!-- Same form content as previous code -->

</div>

</body>
</html>
