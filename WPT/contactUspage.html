<!DOCTYPE html>
<html>
<head>
<title>Contact Us Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#e3e1e1;
}

.container{
    width:500px;
    background:white;
    padding:25px;
    margin:auto;
    margin-top:50px;
    border-radius:12px;
    box-shadow:0 0 12px gray;
}

h2{
    text-align:center;
    color:darkblue;
}

input[type="text"],
input[type="email"],
textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#28a745;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#218838;
}

.info{
    text-align:center;
    margin-top:15px;
    color:#555;
}
</style>

</head>

<body>

<div class="container">

<h2>Contact Us</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter Your Name">

<label>Email</label>
<input type="email" placeholder="Enter Your Email">

<label>Message</label>
<textarea rows="5" placeholder="Write Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

<div class="info">
<p>Email: support@gmail.com</p>
<p>Phone: +91 9876****  </p>
</div>

</div>

</body>
</html>
