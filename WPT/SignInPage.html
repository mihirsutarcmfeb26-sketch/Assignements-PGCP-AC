<!DOCTYPE html>
<html>
<head>
<title>Sign In Page</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #2193b0, #6dd5ed);
}

.container{
    width:350px;
    background:white;
    padding:25px;
    margin:auto;
    margin-top:80px;
    border-radius:12px;
    box-shadow:0 0 12px gray;
}

h2{
    text-align:center;
    color:darkblue;
}

input[type="email"],
input[type="password"]{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

p{
    text-align:center;
}

a{
    text-decoration:none;
    color:blue;
}
</style>

</head>

<body>

<div class="container">

<h2>Sign In</h2>

<form>

<label>Email</label>
<input type="email" placeholder="Enter Email">

<label>Password</label>
<input type="password" placeholder="Enter Password">

<button type="submit">Login</button>

</form>

<p><a href="#">Forgot Password?</a></p>
<p>Don't have an account? <a href="#">Sign Up</a></p>

</div>

</body>
</html>
